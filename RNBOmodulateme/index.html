<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>modulate me</title>

<link rel="stylesheet" href="./style.css">

<script src="https://cdn.jsdelivr.net/npm/@rnbo/js/dist/rnbo.min.js"></script>

<style>
body{
    font-family:sans-serif;
    background:#f2f2f2;
    margin:0;
    padding:0;
}

#background{
    display:none;
}

#rnbo-root{
    max-width:1100px;
    margin:20px auto;
    padding:20px;
}

#patcher-title{
    font-size:40px;
    text-align:center;
    margin:0 0 24px 0;
}

/* RNBO parts that must stay in HTML, but should not be visible */
#rnbo-clickable-keyboard,
#rnbo-console,
#rnbo-presets{
    display:none;
}

#rnbo-inports{
    visibility:hidden;
    height:0;
    overflow:hidden;
    margin:0;
    padding:0;
}

/* sound button */
#soundon-button-wrap{
    display:flex;
    justify-content:center;
    margin-bottom:28px;
}

#soundon-button{
    font-size:22px;
    padding:14px 30px;
    border:none;
    border-radius:14px;
    cursor:pointer;
    min-width:180px;
}

#soundon-button.on{
    background:#8bd48b;
}

#soundon-button.off{
    background:#cccccc;
}

/* parameter area */
#rnbo-parameter-sliders{
    display:flex;
    flex-direction:row;
    justify-content:center;
    align-items:flex-end;
    gap:36px;
    margin-top:10px;
    min-height:440px;
}

#rnbo-parameter-sliders h2,
#no-param-label{
    display:none;
}

/* each parameter block */
#rnbo-parameter-sliders > div{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-end;
    width:120px;
    min-height:390px;
}

/* parameter labels */
#rnbo-parameter-sliders label{
    font-size:22px;
    margin-bottom:18px;
    text-align:center;
}
    
#rnbo-parameter-sliders label::after {
    content: "";
}

/* make the range sliders vertical by rotating them */
#rnbo-parameter-sliders input[type="range"]{
    -webkit-appearance:none;
    appearance:none;
    width:260px;
    height:44px;
    transform:rotate(-90deg);
    transform-origin:center;
    margin:110px 0;
    touch-action:none;
}

/* number boxes */
#rnbo-parameter-sliders input[type="number"],
#rnbo-parameter-sliders input[type="text"]{
    margin-top:18px;
    font-size:20px;
    width:80px;
    text-align:center;
}

/* mobile */
@media (max-width: 900px){
    #rnbo-root{
        padding:16px;
    }

    #patcher-title{
        font-size:34px;
    }

    #rnbo-parameter-sliders{
        gap:20px;
        min-height:360px;
    }

    #rnbo-parameter-sliders > div{
        width:82px;
        min-height:320px;
    }

    #rnbo-parameter-sliders label{
        font-size:18px;
    }

    #rnbo-parameter-sliders input[type="range"]{
        width:220px;
        height:40px;
        margin:90px 0;
    }

    #rnbo-parameter-sliders input[type="number"],
    #rnbo-parameter-sliders input[type="text"]{
        font-size:18px;
        width:64px;
    }

    #soundon-button{
        font-size:20px;
        min-width:150px;
    }
}
</style>
</head>

<body>

<noscript>You need to enable JavaScript to run this app.</noscript>

<svg id="background" width="100%" height="100%"></svg>

<div id="rnbo-root">

    <h1 id="patcher-title">modulate me</h1>

    <div id="soundon-button-wrap">
        <button id="soundon-button" class="off" type="button">sound off</button>
    </div>

    <div id="rnbo-clickable-keyboard">
        <h2>MIDI Keyboard</h2>
        <em id="no-midi-label">No MIDI input</em>
    </div>

    <div id="rnbo-inports">
        <h2>Inports</h2>
        <em id="no-inports-label">No inports available</em>
        <form id="inport-form" class="inport">
            <div class="inport-input">
                <select id="inport-select"></select>
                <input id="inport-text" type="text">
                <input id="inport-submit" class="smallButton" type="submit" value="Send">
            </div>
        </form>
    </div>

    <div id="rnbo-console">
        <h2>Outports</h2>
        <em id="no-outports-label">No outports available</em>
        <div id="rnbo-console-div">
            <p id="rnbo-console-readout">Waiting for messages...</p>
        </div>
    </div>

    <div id="rnbo-presets">
        <h2>Presets</h2>
        <em id="no-presets-label">No presets defined</em>
        <select id="preset-select"></select>
    </div>

    <div id="rnbo-parameter-sliders">
        <h2>Parameters</h2>
        <em id="no-param-label">No parameters</em>
    </div>

</div>

<script src="./guardrails.js"></script>
<script src="./app.js"></script>

<script>
function setupUI(){
    const container = document.getElementById("rnbo-parameter-sliders");
    const title = document.getElementById("patcher-title");
    if (!container) return;
    if (title) title.textContent = "modulate me";

    const blocks = [...container.children];

    const volume = blocks.find(b => b.textContent.toLowerCase().includes("volume"));
    const carrier = blocks.find(b => b.textContent.toLowerCase().includes("carrier"));
    const ratio = blocks.find(b => b.textContent.toLowerCase().includes("ratio"));
    const modulator = blocks.find(b => b.textContent.toLowerCase().includes("modulator"));
    const sound = blocks.find(b => b.textContent.toLowerCase().includes("soundon"));

    if (!volume || !carrier || !ratio || !modulator || !sound) return;

    container.append(volume);
    container.append(carrier);
    container.append(ratio);
    container.append(modulator);

    sound.style.display = "none";

    const soundInput = sound.querySelector("input");
    const button = document.getElementById("soundon-button");

    if (soundInput && button && !button.dataset.bound) {
        const current = parseFloat(soundInput.value) || 0;
        button.className = current > 0 ? "on" : "off";
        button.textContent = current > 0 ? "sound on" : "sound off";

        button.onclick = () => {
            const now = parseFloat(soundInput.value) || 0;
            const next = now > 0 ? 0 : 1;

            soundInput.value = next;
            soundInput.dispatchEvent(new Event("input", { bubbles:true }));
            soundInput.dispatchEvent(new Event("change", { bubbles:true }));

            button.className = next > 0 ? "on" : "off";
            button.textContent = next > 0 ? "sound on" : "sound off";
        };

        button.dataset.bound = "1";
    }
}

setInterval(setupUI, 300);
</script>

</body>
</html>
