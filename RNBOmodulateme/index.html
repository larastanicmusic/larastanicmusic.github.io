<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>modulate me</title>

  <link rel="stylesheet" href="./style.css" />

  <!-- RNBO runtime from CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@rnbo/js/dist/rnbo.min.js"></script>
</head>
<body>
  <noscript>You need to enable JavaScript to run this app.</noscript>

  <main id="app">
    <h1>modulate me</h1>

    <button id="start-audio">sound off</button>

    <h2>MIDI Keyboard</h2>
    <div id="midi-devices">No MIDI input</div>

    <h2>Inports</h2>
    <div id="inports">No inports available</div>

    <h2>Outports</h2>
    <div id="outports">No outports available</div>

    <div id="message-display">Waiting for messages...</div>

    <h2>Presets</h2>
    <div id="presets">No presets defined</div>

    <h2>Parameters</h2>
    <div id="parameter-sliders">No parameters</div>
  </main>

  <script src="./guardrails.js"></script>
  <script src="./app.js"></script>
</body>
</html>
