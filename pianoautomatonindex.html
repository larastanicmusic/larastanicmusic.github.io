<!DOCTYPE html>
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, hight=device-hight, initial-scale=1.0">
   <title>PIANO_AUTOMATON</title>
   <style>
.prevent-select {
  -webkit-user-select: none; /* Safari */
  user-select: none; /* Standard syntax */
         font-family: Verdana, sans-serif; 
}
  
       #status {
          position: fixed;
          top: 0px;
          left: 0px;
          width: 100%;
          height: 6px;
          background: #f00;
       }
       #status.connected {
          background: #0f0;
       }
       #keyboard {
           position: relative;
           width: 100%;
           height: 38vw;
           border: 2px solid #000;
           display: flex;
           margin-top: 10px;
       }
       .white-key {
           height: 38vw;
           background: white;
           border: 1px solid black;
           box-sizing: border-box;
           text-align: center;
           cursor: pointer;
           font-size: 5vw;
           display: flex;
           align-items: flex-end;
           justify-content: center;
           padding-bottom: 1vw;
       }
       .black-key {
           height: 22vw;
           background: black;
           position: absolute;
           z-index: 2;
           cursor: pointer;
           text-align: center;
           color: white;
           font-size: 5vw;
           display: flex;
           align-items: center;
           justify-content: center;
       }
       h2 {
           font-size: 7vw;
           font-weight: 400;
           text-align: center;
       }
       #textDisplay {
           width: 100%;
           max-width: 420px;
           height: 43vw;
           font-size: 6vw;
           text-align: center;
           line-height: 7vw;
           border: 2px solid #000;
           margin: 0px auto;
       }
       #volumeSliderContainer {
           display: flex;
           align-items: center;
           justify-content: center;
           margin: 5px auto; 
       }
       #volumeSlider {
           width: 100%;
           max-width: 420px;
           margin: 8px auto;
       }
       #volumeValue {
           font-size: 5vw;
           text-align: right;
           margin-top: 0px; 
       }
       #volumeTitle {
           font-size: 3vw;
           text-align: right;
           margin-top: 0px; 
       }
       #glissandoSliderContainer {
           display: flex;
           align-items: center;
           justify-content: center;
           margin: 0px auto; 
       }
       #glissandoSlider {
        width: 100%;
           max-width: 400px;
           margin: 10px auto;
      margin-top: 3px;
           background: rgb(201, 219, 111);
         }
         #glissandoTitle {
        font-size: 5vw;
        text-align: right;
        margin-top: 3px; 
        color: rgb(208, 208, 45);
            }      
       #speedSliderContainer {
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0px auto; 
        margin-top: 4px ;
    }
        #speedSlider {
           width: 100%;  
           max-width: 420px;
           margin: 6px auto;
        margin-top: 0px ;
           background: green;  
       }
        #speedTitle {
        font-size: 3vw;
        text-align: right;
        color: green;
        margin-top: 0px;
    }
        #speedDisplay {
        font-size: 5vw;
        text-align: right;
        color: green;
        margin-top: -10px;
    }

    #toggleSpeedButton {
          font-size: 6vw;
          padding: 1px 10px;
          margin: 0px ;
          margin-top: 6px;
          margin-left: 10px ;
          background: #ffffff;
          display: flex;
          border: 1px solid #000;
          align-items: center;
          justify-content: center;
          color: #22903f;
       }
       .white-key.pressed {
           background-color: yellow;
       }
       .black-key.pressed {
           background-color: rgb(183, 154, 24);
       }
       input[type="range"] {
        -webkit-appearance: none;
        width: 100%;
        height: 5px; /* Adjust the height of the slider */
        background: #0073ff;
        outline: none;
        opacity: 0.7;
        transition: opacity .2s;
    }

    input[type="range"]:hover {
        opacity: 1;
    }
    input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 30px; /* Adjust the width of the thumb */
        height: 30px; /* Adjust the height of the thumb */
        background: #000000;
        cursor: pointer;
        border-radius: 50%; /* Make the thumb circular */
    }

    input[type="range"]::-moz-range-thumb {
        width: 30px; /* Adjust the width of the thumb */
        height: 30px; /* Adjust the height of the thumb */
        background: #4CAF50;
        cursor: pointer;
        border-radius: 50%; /* Make the thumb circular */
    }

   </style>
</head>
<body scroll="no" style="margin: 1; height: 100%; overflow: hidden">
    <div id="status"></div>
 <!--   <h2>PIANO AUTOMATON</h2> -->
    <div class="prevent-select" id="textDisplay"></div>
    <div class="prevent-select"id="volumeValue">VOLUME: 100</div>
    <div id="volumeSliderContainer">
        
        <input type="range" id="volumeSlider" min="0.1" max="1.0" step="0.1" value="1">
    </div>
    
    <div id="keyboard">
        <!-- White Keys: C D E F G A B -->
        <div class="white-key" data-midi="60">C</div>
        <div class="white-key" data-midi="62">D</div>
        <div class="white-key" data-midi="64">E</div>
        <div class="white-key" data-midi="65">F</div>
        <div class="white-key" data-midi="67">G</div>
        <div class="white-key" data-midi="69">A</div>
        <div class="white-key" data-midi="71">B</div>

        <!-- Black Keys: C# D# F# G# A# -->
        <div class="black-key" data-midi="61">C#</div>
        <div class="black-key" data-midi="63">D#¯</div>
        <div class="black-key" data-midi="66">F#</div>
        <div class="black-key" data-midi="68">G#</div>
        <div class="black-key" data-midi="70">A#</div>
    </div>
    <div class="prevent-select" id="glissandoTitle">GLISSANDO</div>
    <div id="glissandoSliderContainer">
        <input type="range" id="glissandoSlider" min="21" max="108" step="1" value="64">
    </div>
    <button class="prevent-select" id="toggleSpeedButton">speed is off</button>
    </div>
    <div class="prevent-select" id="speedDisplay">SPEED: 0%</div>
    <div class="prevent-select" id="speedTitle"></div>
    <div id="speedSliderContainer">
        <input type="range" id="speedSlider" min="0" max="100" step="1" value="0">


    <script>
        let socket
        let selectedNotes = []
        const noteNames = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B']
        let range = {min: 60, max: 71}
        let speedOn = false

        document.addEventListener('DOMContentLoaded', function() {
            ws_connect()
            build_keyboard()
        })
        
        window.addEventListener('resize', function() {
            build_keyboard()
        })

        function ws_connect() {
            if ('WebSocket' in window) {
                socket = new WebSocket('ws://' + window.location.hostname + ':8080')
                socket.onopen = function(ev) {
                    console.log('WebSocket connection opened')
                    document.getElementById('status').classList = 'connected'
                    // send id
                    const id = localStorage.getItem('id') ?? -1
                    socket.send(JSON.stringify({type: 'id', id: id}))
                    // send current state
                    for(const note of selectedNotes) {
                      sendMidiNote(note, 1)
                    }
                    sendVolume()
                    sendSpeed()
                }
                socket.onclose = function(ev) {
                    console.log('WebSocket connection closed')
                    document.getElementById('status').classList.remove('connected')
                    setTimeout(ws_connect,1000)
                }
                socket.onmessage = function(msg) {
                    let data = JSON.parse(msg.data)
                    console.log('Message from server: ', data)
                    switch (data.type) {
                      case 'id':
                        localStorage.setItem('id', data.value)
                        socket.send(JSON.stringify({type: 'id', id: data.value}))
                        break
                      case 'msg':
                        document.getElementById('textDisplay').innerHTML = data.value
                        break
                      case 'range':
                        range.min = data.min
                        range.max = data.max
                        selectedNotes = []
                        build_keyboard()
if (speedValue = speedOn) {toggleSpeed()}
document.getElementById('volumeSlider').value="1"
document.getElementById('volumeValue').textContent = `VOLUME: 100`
document.getElementById('speedSlider').value="0"
document.getElementById('speedDisplay').textContent = `SPEED: 0`
document.getElementById('glissandoSlider').value="0"
                        break
                    }
                }
                socket.onerror = function(ev) {
                    document.getElementById('status').classList.remove('connected')
                    console.log('no WebSocket connection')
                }
            } else {
                alert("WebSocket is not supported by your browser.")
            }
        }
        
        function build_keyboard() {
          const keyboard = document.getElementById('keyboard')
          keyboard.innerHTML = ''

          let num = 0
          let black_first = [1,3,6,8,10].includes(range.min % 12)
          let black_last  = [1,3,6,8,10].includes(range.max % 12)
          for(let midi = range.min; midi <= range.max; midi++) {
            if([0,2,4,5,7,9,11].includes(midi%12)) { num ++ }
          }
          if(black_first) { num += 0.42 }
          if(black_last) { num += 0.42 }
          const width = keyboard.getBoundingClientRect().width / num
                    
          let i = 0
          for(let midi = range.min; midi <= range.max; midi++) {
            if([0,2,4,5,7,9,11].includes(midi%12)) { 
              let key = document.createElement('div')
              key.className = 'white-key'
              if(selectedNotes.includes(midi)) {
                key.classList.add('pressed')
              }
              key.style.width = width+'px'
              if(i == 0 && black_first) {
                key.style.marginLeft = (width * 0.42)+'px'
              }
              key.setAttribute('data-midi', midi)
              key.innerHTML = noteNames[midi%12]
              keyboard.appendChild(key) 
              i++          
            }
            else {
              let key = document.createElement('div')
              key.className = 'black-key'
              if(selectedNotes.includes(midi)) {
                key.classList.add('pressed')
              }
              key.style.width = (width * 0.75)+'px'
              let offset = black_first ? width * 0.42 : 0
              key.style.left = (i * width - 0.42 * width + offset)+'px'
              key.setAttribute('data-midi', midi)
              key.innerHTML = noteNames[midi%12]
              keyboard.appendChild(key)             
            }

          }        
 
          const glissSlider = document.getElementById("glissandoSlider")
	      glissSlider.setAttribute("min", range.min)
	      glissSlider.setAttribute("max", range.max)
          glissSlider.addEventListener('input', () => {
             sendGlissando()
          })

        document.querySelectorAll('.white-key, .black-key').forEach(key => {
            key.addEventListener('click', () => {
                const midiNote = parseInt(key.getAttribute('data-midi'))
                toggleMidiNote(midiNote, key)
            })
            key.addEventListener('touchstart', (e) => {
                e.preventDefault()
                const midiNote = parseInt(key.getAttribute('data-midi'))
                toggleMidiNote(midiNote, key)
            })
          })
        }

        function sendMidiNote(note, state) {
          if (socket && socket.readyState === WebSocket.OPEN) {
            socket.send(JSON.stringify({ type: 'note', note: note, state: state }))
          }
        }
        
        function sendVolume() {
            if (socket && socket.readyState === WebSocket.OPEN) {
                const slider = document.getElementById('volumeSlider')
                socket.send(JSON.stringify({ type: 'vol', value: parseFloat(slider.value) }))
                console.log(`Volume: ${slider.value}`)
          }
        }
        
        function sendGlissando() {
            if (socket && socket.readyState === WebSocket.OPEN) {
                const slider = document.getElementById('glissandoSlider')
                socket.send(JSON.stringify({ type: 'gliss', value: parseFloat(slider.value) }))
                console.log(`Glissando: ${slider.value}`)
          }
        }

        function sendSpeed() {
            if (socket && socket.readyState === WebSocket.OPEN) {
                const slider = document.getElementById('speedSlider')
                socket.send(JSON.stringify({ type: 'speed', value: parseFloat(slider.value) }))
                console.log(`Speed: ${slider.value}`)
          }
        }
        function toggleSpeed() {
            speedOn = !speedOn
            const speedValue = speedOn ? 1 : 0
            if (socket && socket.readyState === WebSocket.OPEN) {
                socket.send(JSON.stringify({ type: 'speedToggle', value: speedValue }))
                console.log(`Speed Toggle: ${speedValue}`)
            }
            document.getElementById('toggleSpeedButton').textContent = speedOn ? 'speed is ON' : 'speed is OFF'
        }
        function toggleMidiNote(midi, element) {
            if (selectedNotes.includes(midi)) {
                selectedNotes = selectedNotes.filter(n => n !== midi)
                element.classList.remove('pressed')
                sendMidiNote(midi, 0)
            } else {
                selectedNotes.push(midi)
                element.classList.add('pressed')
                sendMidiNote(midi, 1)
            }
            let selectedNoteNames = []
            for(const note of selectedNotes) {
              selectedNoteNames.push(noteNames[note%12])
            }
            document.getElementById('midiNoteDisplay').textContent = `note: ${selectedNoteNames.join(', ')}`  
            
        }

        document.getElementById('volumeSlider').addEventListener('input', function() {
        const volumeValue = Math.round(this.value * 100)
        document.getElementById('volumeValue').textContent = `VOLUME: ${volumeValue}`
        sendVolume()
        })

document.addEventListener('dblclick', function(event) {
    event.preventDefault();
}, { passive: false });

        document.getElementById('speedSlider').addEventListener('input', function() {
            document.getElementById('speedDisplay').textContent = `SPEED: ${this.value}%`
            sendSpeed()
        })
        document.getElementById('toggleSpeedButton').addEventListener('click', toggleSpeed)
    </script>
</body>
</html>
